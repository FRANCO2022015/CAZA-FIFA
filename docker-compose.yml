version: '3.8'

services:
  # ─────────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: caza_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: caza_db
      POSTGRES_USER: caza_user
      POSTGRES_PASSWORD: caza_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # ./caza-backend/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - caza_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caza_user -d caza_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Spring Boot Backend
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./caza-backend
      dockerfile: Dockerfile
    container_name: caza_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/caza_db
      SPRING_DATASOURCE_USERNAME: caza_user
      SPRING_DATASOURCE_PASSWORD: caza_pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      JWT_EXPIRATION: 86400000
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:80
    ports:
      - "8081:8080"
    networks:
      - caza_network

  # ─────────────────────────────────────────────
  # React Frontend (Production Build via Nginx)
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./caza-frontend
      dockerfile: Dockerfile
    container_name: caza_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - caza_network

volumes:
  postgres_data:
    driver: local

networks:
  caza_network:
    driver: bridge
